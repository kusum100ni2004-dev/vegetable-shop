<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h1>Orders</h1>

<div id="orders"></div>

<script>

let orders =
JSON.parse(localStorage.getItem("orders")) || [];

let html = "";

orders.forEach((order,index)=>{

html += `<h2>Order ${index+1}</h2>`;
html += `<p>${order.date}</p>`;

order.items.forEach(item=>{

html += `
<p>
${item.name}
|
Qty:${item.qty}
|
₹${item.price * item.qty}
</p>
`;

});

html += "<hr>";
});

document.getElementById("orders").innerHTML = html;

</script>

</body>
</html>
